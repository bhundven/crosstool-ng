---
name: CI

on:
  push:
    branches: [master]
    tags: ['*']
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  crosstool:
    runs-on: ${{ matrix.host }}
    strategy:
      matrix:
        host: ["ubuntu-22.04"]
    steps:
      - name: "clone"
        uses: actions/checkout@v6
      - name: "prereq"
        uses: ./.github/actions/prereqs
        with:
          os: ${{ runner.os }}
      - name: "build ct-ng"
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            PATH="$PATH:$(brew --prefix)/opt/binutils/bin"
            export PATH
            CPPFLAGS="-I$(brew --prefix)/opt/ncurses/include -I$(brew --prefix)/opt/gettext/include"
            export CPPFLAGS
            LDFLAGS="-L$(brew --prefix)/opt/ncurses/lib -L$(brew --prefix)/opt/gettext/lib"
            export LDFLAGS
          fi
          ./bootstrap
          ./configure --prefix="$PWD/.local/"
          make
          make install
          tar -cf ct-ng.tar .local/
      - name: "upload ct-ng"
        uses: actions/upload-artifact@v7
        with:
          name: crosstool.${{ matrix.host }}
          path: ct-ng.tar
      - name: "upload config.log"
        uses: actions/upload-artifact@v7
        with:
          name: config.log.${{ matrix.host }}
          path: config.log
        if: ${{ always() }}

  tarballs:
    needs: crosstool
    runs-on: ${{ matrix.host }}
    strategy:
      matrix:
        host: ["ubuntu-22.04"]
    steps:
      - name: "fetch CI helpers"
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions
            maintainer/gha
      - name: "download ct-ng"
        uses: actions/download-artifact@v8
        with:
          name: crosstool.${{ matrix.host }}
      - name: "extract ct-ng"
        run: |
          tar -xf ct-ng.tar
      - name: cache tarballs
        id: cache
        uses: actions/cache@v5
        with:
          path: src.tar
          key: src.tar-${{ hashFiles('.local/share/crosstool-ng/packages') }}-${{ hashFiles('.local/share/crosstool-ng/samples') }}
          restore-keys: |
            src.tar-${{ hashFiles('.local/share/crosstool-ng/packages') }}-
            src.tar-
      - name: extract tarballs
        run: |
          tar -xvf src.tar || true
          touch stamp
      - name: "prereq"
        uses: ./.github/actions/prereqs
        with:
          os: ${{ runner.os }}
          add-local-bin-to-path: "true"
      - name: "ct-ng source"
        run: |
          mkdir -p src
          for sample in aarch64-unknown-linux-gnu arm-none-eabi \
                arm-unknown-linux-musleabi armv6-nommu-linux-uclibcgnueabi \
                x86_64-w64-mingw32; do \
                ct-ng $sample; \
                maintainer/gha/tweak-config.sh; \
                sed -i -e 's/^.*CT_COMP_TOOLS_BISON.*$/CT_COMP_TOOLS_BISON=y/' .config; \
                sed -i -e 's/^.*CT_COMP_TOOLS_M4.*$/CT_COMP_TOOLS_M4=y/' .config; \
                sed -i -e 's/^.*CT_COMP_TOOLS_MAKE.*$/CT_COMP_TOOLS_MAKE=y/' .config; \
                sed -i -e 's/^.*CT_DOWNLOAD_WGET_OPTIONS.*$/CT_DOWNLOAD_WGET_OPTIONS="--tries=3 -nc --progress=dot:binary --no-use-server-timestamps"/' .config; \
                ct-ng olddefconfig; \
                ct-ng source; \
          done
          find src -type f -not -newer stamp -delete -print
          tar -cvf src.tar src

  # Choose which samples to build. To reduce CI spend, pull requests build a
  # representative subset covering the major arch/libc/runtime combos (glibc,
  # musl, bare-metal, mingw, big-endian); the full ~30-sample matrix runs on
  # push-to-master, tags, and manual dispatch.
  select-samples:
    runs-on: ubuntu-22.04
    outputs:
      samples: ${{ steps.pick.outputs.samples }}
    env:
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - name: pick sample set
        id: pick
        run: |
          subset='["aarch64-unknown-linux-gnu","arm-unknown-linux-musleabi","powerpc-unknown-linux-gnu","riscv64-unknown-elf","x86_64-unknown-linux-gnu","x86_64-w64-mingw32"]'
          full='["aarch64-unknown-linux-gnu","aarch64-unknown-linux-musl","arc-multilib-elf32","arc-multilib-linux-gnu","arc-multilib-linux-uclibc","arm-picolibc-default","arm-unknown-linux-gnueabi","arm-unknown-linux-musleabi","armv6-nommu-linux-uclibcgnueabi","avr","hppa-unknown-linux-gnu","i686-w64-mingw32","loongarch64-unknown-linux-gnu","loongarch64-unknown-linux-musl","mips-unknown-elf","mips-unknown-linux-gnu","mips64-unknown-linux-gnu","powerpc-unknown-linux-gnu","powerpc64-unknown-linux-gnu","powerpc64-unknown-linux-musl","riscv32-unknown-elf","riscv64-unknown-elf","riscv64-unknown-linux-gnu","s390-unknown-linux-gnu","sh-unknown-elf","sparc-unknown-linux-gnu","x86_64-multilib-linux-uclibc","x86_64-unknown-linux-gnu","x86_64-w64-mingw32","xtensa-fsf-linux-uclibc"]'
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            echo "samples=${subset}" >> "$GITHUB_OUTPUT"
          else
            echo "samples=${full}" >> "$GITHUB_OUTPUT"
          fi

  toolchains:
    needs: [crosstool, tarballs, select-samples]
    uses: ./.github/workflows/build-toolchains.yml
    with:
      samples: ${{ needs.select-samples.outputs.samples }}
